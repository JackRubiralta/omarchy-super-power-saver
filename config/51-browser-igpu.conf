# omarchy-super-power-saver: pin Firefox's DMABuf/VAAPI device to the Intel
# iGPU BY PATH. On this machine the render-node numbers are INVERTED from the
# usual layout (NVIDIA dGPU = renderD128, Intel = renderD129) and numbering
# can flip across boots — a numeric node here could hand video decode to the
# NVIDIA card and wake it (~9.9W). Installed to ~/.config/environment.d/ by
# install.sh; takes effect at next login (uwsm reads environment.d).
MOZ_DRM_DEVICE=/dev/dri/by-path/pci-0000:00:02.0-render
