# omarchy-super-power-saver: Chromium launch flags (Arch reads
# ~/.config/chromium-flags.conf natively; ONE --enable-features line only —
# Chromium takes the last occurrence).
#
# Verified against Chromium 148 source (2026-07-08): VAAPI hw video DECODE
# (AcceleratedVideoDecodeLinuxGL + ZeroCopyGL) is default-on since M143 —
# listing those names adds nothing. TouchpadOverscrollHistoryNavigation and
# the Wayland backend are default too; ozone lines kept to pin behavior for
# uwsm/webapp launches. Battery Saver does not function on desktop Linux
# (no battery-level provider); Memory Saver is enabled via managed policy
# instead (see setup script).
--ozone-platform=wayland
--ozone-platform-hint=wayland
--load-extension=~/.local/share/omarchy/default/chromium/extensions/copy-url

# WebRtcPipeWireCamera: still disabled-by-default in 148; needed for camera
#   via the PipeWire portal on Wayland.
# AcceleratedVideoEncoder: VAAPI hw ENCODE (video calls), disabled-by-default.
#   ARL-H media engine supports it; if a call ever shows wrong colors, remove
#   it (intel-media-driver encode bugs exist on adjacent platforms) — decode
#   is unaffected.
--enable-features=WebRtcPipeWireCamera,AcceleratedVideoEncoder
