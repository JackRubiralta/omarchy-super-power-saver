# omarchy-super-power-saver: Electron apps read this on Arch. Electron majors
# lag Chromium: bundled 131-142 still has zero-copy VAAPI decode DISABLED by
# default and <=130 uses older names — so the decode features are listed
# explicitly here (redundant on new Electron, load-bearing on old, silently
# ignored where unknown).
--ozone-platform-hint=auto
--enable-features=AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL
